seed: 42

# -----------------------------------------------------------------------------
# 数据
# -----------------------------------------------------------------------------
data:
  datasets_root: /home/liushudong/AAASSET/datasets/imagen/
  dataset_name: celeba
  img_size: 64
  batch_size: 64
  num_workers: 4
  pin_memory: true
  train_augment: true
  normalize_mean: 0.5
  normalize_std: 0.5
  cache_paths: false

# -----------------------------------------------------------------------------
# 训练：步数、buffer、rollout
# -----------------------------------------------------------------------------
train:
  use_vq: false

  max_steps: 1000000
  log_interval: 1
  val_interval: 100

  buffer_size: 50000
  batch_rl: 64
  batch_d: 64

  warmup_steps: 500
  d_steps: 3
  d_batch: 64
  renderer_freeze_steps: 0

  # horizon=64 对齐 num_patches (64×64 img / 8×8 patch = 64)，
  # 每步 action 约对应一个空间 token，支撑从粗到细的变长编码
  horizon: 64
  # 高保真目标；即使难以触发 done=1，buffer 的 t>0.95 条件
  # 依然会把最后几步写入 terminal buffer 供 discriminator 使用
  stop_tau: 0.999

# -----------------------------------------------------------------------------
# 训练：RL 与奖励
# -----------------------------------------------------------------------------
  gamma: 0.99
  # 每步 MSE 增量约 0.01-0.03，乘以 50 得 shaping reward ≈ 0.5-1.5，
  # 累积 Q ≈ 60-80，量级合理且信号够强
  shaping_scale: 50.0

  adv_reward_lambda: 1.0
  l2_reward_lambda: 1.0
  lpips_lambda: 0.5
  msssim_lambda: 0.0

  tau: 0.005

  explore_steps: 50000
  ou_scale_init: 0.5
  ou_scale_end: 0.0
  ou_theta: 0.15
  ou_sigma: 0.2

# -----------------------------------------------------------------------------
# 训练：学习率与日志
# -----------------------------------------------------------------------------
  actor_lr: 3e-5
  renderer_lr: 3e-5
  critic_lr: 1e-4
  d_lr: 3e-5
  codebook_lr: 3e-5
  weight_decay: 0.05

  save_interval: 10000
  dump_every_n_batches: 8

# -----------------------------------------------------------------------------
# 模型：全局与 VQ
# -----------------------------------------------------------------------------
model:
  img_size: 64
  patch_size: 8
  seq_len: 64
  canvas_channels: 3
  token_dim: 64
  hidden_dim: 512

  codebook_size: 8192
  use_vq: false

# -----------------------------------------------------------------------------
# 模型：Actor / Renderer / Critic / GAN
# -----------------------------------------------------------------------------
  actor_depth: 12
  actor_attn_heads: 16

  renderer_depth: 8
  renderer_attn_heads: 16

  critic_depth: 12
  critic_attn_heads: 16

  use_gp: true
  gp_lambda: 10.0
